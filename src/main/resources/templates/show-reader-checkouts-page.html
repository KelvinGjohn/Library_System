<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Reader Checkouts</title></head>
<body>
<h2 th:text="${historyMode} ? 'Checkout History for ' + ${reader.name} + ' ' + ${reader.surname}
                           : 'Currently Borrowed by ' + ${reader.name} + ' ' + ${reader.surname}">
</h2>

<a href="/reader/all"> Back to Readers</a>
<br/><br/>

<p th:if="${#lists.isEmpty(checkouts)}">No records found.</p>

<table border="1" cellpadding="6" th:unless="${#lists.isEmpty(checkouts)}">
  <thead>
    <tr>
      <th>Checkout ID</th><th>Book Title</th><th>Checkout Date</th>
      <th>Due Date</th><th>Returned?</th>
    </tr>
  </thead>
  <tbody>
    <tr th:each="c : ${checkouts}">
      <td th:text="${c.idc}"></td>
      <td th:text="${c.book.title}"></td>
      <td th:text="${c.checkoutDate}"></td>
      <td th:text="${c.dueDate}"></td>
      <td th:text="${c.returned} ? 'Yes' : 'No'"></td>
    </tr>
  </tbody>
</table>
</body>
</html>
