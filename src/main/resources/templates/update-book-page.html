<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Update Book</title></head>
<body>
<h1>Update Book</h1>
<form th:action="@{/book/update/{id}(id=${book.idb})}" th:object="${book}" method="post">

  <label>ISBN:</label><br/>
  <input type="text" th:field="*{isbn}"/>
  <span th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}" style="color:red;"></span>
  <br/><br/>

  <label>Title:</label><br/>
  <input type="text" th:field="*{title}"/>
  <br/><br/>

  <label>Author:</label><br/>
  <input type="text" th:field="*{author}"/>
  <br/><br/>

  <label>Year:</label><br/>
  <input type="number" th:field="*{year}"/>
  <br/><br/>

  <label>Rating (0-5):</label><br/>
  <input type="number" step="0.1" min="0" max="5" th:field="*{rating}"/>
  <br/><br/>

  <label>Condition:</label><br/>
  <select th:field="*{condition}">
    <option th:each="c : ${conditions}" th:value="${c}" th:text="${c}"></option>
  </select>
  <br/><br/>

  <label>Rarity:</label><br/>
  <input type="text" th:field="*{rarity}"/>
  <br/><br/>

  <label>Department:</label><br/>
  <select name="departmentId">
    <option th:each="d : ${departments}"
            th:value="${d.idld}"
            th:text="${d.specialization}"
            th:selected="${d.idld == book.libraryDepartment.idld}">
    </option>
  </select>
  <br/><br/>

  <button type="submit">Update</button>
  <a href="/book/all">Cancel</a>
</form>
</body>
</html>
