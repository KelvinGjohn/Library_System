<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Update Reader</title></head>
<body>
<h1>Update Reader</h1>
<form th:action="@{/reader/update/{id}(id=${reader.idr})}" th:object="${reader}" method="post">

  <label>Name:</label><br/>
  <input type="text" th:field="*{name}"/>
  <span th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color:red;"></span>
  <br/><br/>

  <label>Surname:</label><br/>
  <input type="text" th:field="*{surname}"/>
  <br/><br/>

  <label>Library User Number:</label><br/>
  <input type="text" th:field="*{libraryUserNumber}"/>
  <br/><br/>

  <button type="submit">Update</button>
  <a href="/reader/all">Cancel</a>
</form>
</body>
</html>
